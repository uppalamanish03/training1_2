<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>moving ball</title>

<style>
.ball{
    margin: auto 50px;
    width:50px;
    height:50px;
    border-radius:50%;
    border:2px solid black;
    position:absolute;
    animation: moveball 5s infinite;
}
@keyframes moveball{
    0%{
        left:0;
        top: 0;
    }
     20%{
        left: 120px;;
        top: 0;
    }
     40%{
        left:140px;
        top: 110px;
    }
     60%{
        left:140px;
        top: 140px;
    }
     100%{
        left:140px;
        top: 180px;
    }
}
</style>
</head>
<body>
    <div class="ball">
        <!-- ball -->
    </div>
    
</body>
</html>
