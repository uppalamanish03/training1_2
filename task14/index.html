<!-- Exercise 14: Responsive Product Card
Requirements
Display:
• Product Image
• Name
• Price
• Buy Button
Features:
• Responsive Layout
• Image Zoom on Hover
• Button Transition -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive product Card</title>
    <style>
        h1{
            text-align: center;
        }
        .products{
            display: flex;
            flex-direction: row;
        }
        button{
            padding: 10px 20px;
            background-color: black;
            color: orange;
            
        }
        img:hover{
            transition: all 1s;
            transform: scale(1.1);
        }
        .container:hover{
            transition: all 1s;
            transform: scale(1.1);
        }
       button:hover{
        transition: all 0.5s;
        transition-property: "background-color";
        background-color: red;
        color: black;
        transform: scale(1.1);
       }
    .container{
        padding: 20px;
        margin: 20px auto;
        border: 2px solid black;
        height: auto;
        width: max-content;
        display:flex;
        flex-direction:column;
        align-items:center;
    }

    @media (max-width:700px) {
        .products{
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        
    }
    </style>
</head>
<body>
    <h1>Responsive product Card</h1>
    <div class="products">
    <div class="container">
        <img src="./jp.jpg" alt="product ">
        <p>Name:Laptop</p>
        <p>price:5000</p>
        <button>buy</button>
    </div>
    <div class="container">
        <img src="./jp.jpg" alt="product ">
        <p>Name:Laptop</p>
        <p>price:5000</p>
        <button>buy</button>
    </div>
    <div class="container">
        <img src="./jp.jpg" alt="product ">
        <p>Name:Laptop</p>
        <p>price:5000</p>
        <button>buy</button>
    </div>
</div>
</body>
</html>
