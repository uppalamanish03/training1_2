<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 900px;">
            <h2 class="text-center mb-4">Student Registration Form</h2>
            <form class="row g-3">
                <div class="col-md-4">
                    <label for="firstname" class="form-label">Full Name</label>
                    <input type="text" id="firstname" class="form-control" required>
                </div>
                <div class="col-md-4">aq
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label for="mobile" class="form-label">Mobile Number</label>
                    <input type="tel" id="mobile" pattern="[0-9]{10}" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label d-block">Gender</label>
                    <div class="form-check form-check-inline mt-2">
                        <input class="form-check-input" type="radio" name="gender" id="male" value="male" required>
                        <label class="form-check-label" for="male">Male</label>
                    </div>
                    <div class="form-check form-check-inline mt-2">
                        <input class="form-check-input" type="radio" name="gender" id="female" value="female" required>
                        <label class="form-check-label" for="female">Female</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <label for="branch" class="form-label">Branch</label>
                    <select class="form-select" aria-label="Select branch">
                        <option selected disabled>Select branch</option>
                        <option value="cse">CSE</option>
                        <option value="data-science">Data Science</option>
                        <option value="cyber-security">Cyber Security</option>
                        <option value="aiml">AIML</option>
                        <option value="csbs">CSBS</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="dob" class="form-label">DOB</label>
                    <input type="date" id="dob" class="form-control" required>
                </div>
                <div class="col-md-8">
                    <label for="address" class="form-label">Address</label>
                    <textarea id="address" class="form-control" rows="1" required></textarea>
                </div>
                <div class="col-12">
                    <label for="photo" class="form-label">Upload photo</label>
                    <input type="file" id="photo" class="form-control" required>
                </div>
                <div class="col-12 my-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="invalidCheck2" required>
                        <label class="form-check-label" for="invalidCheck2">
                            Agree to terms and conditions
                        </label>
                    </div>
                </div>
                <div class="col-12 text-center">
                    <button class="btn btn-primary px-4" type="submit">Submit</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
