
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile card</title>
    <style>
        .card {
            display: flex;
            flex-direction: row;
            align-items: center;
            border: 1px solid #ccc;
            padding: 20px;
            max-width: 400px;
            margin: 20px auto;
        }
        .profile-image {
            width: 100px;
            height: 100px;
            border: 2px solid rgb(37, 33, 33);
            border-radius: 50%;
            margin-right: 20px;
        }
        .details {
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 600px) {
            .card {
                flex-direction: column;
                text-align: center;
            }
            .profile-image {
                margin-right: 0;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="./jp.jpg" alt="Profile Image" class="profile-image">
        <div class="details">
            <h2>uppala manish</h2>
            <p>Branch: Data Science</p>
            <p>Email: uppalamanish@gmail.com.com</p>
        </div>
    </div>

</body>
</html>
