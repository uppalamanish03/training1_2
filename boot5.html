<!-- Exercise 7.1:
Create a sample page with different Bootstrap typography utilities: display-1, lead, text-muted,
fw-bold, etc.
Exercise 7.2:
Use text-uppercase, text-lowercase, text-capitalize. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</head>
<body>
    <div class="display-1">hello, world!</div>
    <div class="lead">This is a lead paragraph.</div>
    <p class="text-muted">This is a muted text.</p>
    <p class="fw-bold">This is bold text.</p>
    <p class="text-uppercase">This is uppercase text.</p>
    <p class="text-lowercase">This is lowercase text.</p>
    <p class="text-capitalize">This is capitalized text.</p>
</body>
</html>
