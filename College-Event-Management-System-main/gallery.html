<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h1 class="text-center mb-5">Event Gallery</h1>
        <div class="row g-4">
            <div class="col-md-4 col-sm-6">
                <div class="card h-100 shadow">
                    <img src="https://via.placeholder.com/400x250?text=Technical+Quiz"
                         class="card-img-top img-fluid"
                         alt="Technical Quiz">
                    <div class="card-body text-center">
                        <h5 class="card-title">Technical Quiz</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-sm-6">
                <div class="card h-100 shadow">
                    <img src="https://via.placeholder.com/400x250?text=Hackathon"
                         class="card-img-top img-fluid"
                         alt="Hackathon">
                    <div class="card-body text-center">
                        <h5 class="card-title">Hackathon</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-sm-6">
                <div class="card h-100 shadow">
                    <img src="https://via.placeholder.com/400x250?text=Poster+Presentation"
                         class="card-img-top img-fluid"
                         alt="Poster Presentation">
                    <div class="card-body text-center">
                        <h5 class="card-title">Poster Presentation</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-sm-6">
                <div class="card h-100 shadow">
                    <img src="https://via.placeholder.com/400x250?text=Coding+Contest"
                         class="card-img-top img-fluid"
                         alt="Coding Contest">
                    <div class="card-body text-center">
                        <h5 class="card-title">Coding Contest</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-sm-6">
                <div class="card h-100 shadow">
                    <img src="https://via.placeholder.com/400x250?text=Project+Expo"
                         class="card-img-top img-fluid"
                         alt="Project Expo">
                    <div class="card-body text-center">
                        <h5 class="card-title">Project Expo</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-sm-6">
                <div class="card h-100 shadow">
                    <img src="https://via.placeholder.com/400x250?text=Cultural+Fest"
                         class="card-img-top img-fluid"
                         alt="Cultural Fest">
                    <div class="card-body text-center">
                        <h5 class="card-title">Cultural Fest</h5>
                    </div>
                </div>
            </div>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
