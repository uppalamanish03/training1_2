<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .dashboard-header {
            background-color:chocolate;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .card {
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>
    <div class="dashboard-header">
        <h2>Student Dashboard</h2>
    </div>

    <div class="container my-5">
        <div class="row g-4 mb-5">

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card text-center border-primary">
                    <div class="card-body">
                        <h5 class="card-title">Total Students</h5>
                        <h2 class="text-primary">100</h2>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card text-center border-success">
                    <div class="card-body">
                        <h5 class="card-title">Present Students</h5>
                        <h2 class="text-success">80</h2>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card text-center border-danger">
                    <div class="card-body">
                        <h5 class="card-title">Absent Students</h5>
                        <h2 class="text-danger">20</h2>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-3">
                <div class="card text-center border-warning">
                    <div class="card-body">
                        <h5 class="card-title">Placements</h5>
                        <h2 class="text-warning">70</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="mb-4">
            <input type="text" id="searchInput" class="form-control"
                placeholder="Search by Name or Roll Number">
        </div>
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle" id="studentTable">

                <thead class="table-dark">
                    <tr>
                        <th>Roll No</th>
                        <th>Name</th>
                        <th>Branch</th>
                        <th>Attendance</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Rashmika</td>
                        <td>CSE</td>
                        <td><span class="badge bg-success">95%</span></td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>Sam</td>
                        <td>ECE</td>
                        <td><span class="badge bg-warning text-dark">80%</span></td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td>Madhu</td>
                        <td>EEE</td>
                        <td><span class="badge bg-danger">65%</span></td>
                    </tr>

                    <tr>
                        <td>4</td>
                        <td>Nayana</td>
                        <td>CSE</td>
                        <td><span class="badge bg-success">92%</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</body>

</html>
