<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    
</head>
<body class="bg-light">

<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3>Event Registration Form</h3>
                </div>

                <div class="card-body">

                    <form onsubmit="registerEvent(event)">

                        <div class="mb-3">
                            <label class="form-label">Student Name</label>
                            <input type="text"
                                   class="form-control"
                                   placeholder="Enter your name"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Roll Number</label>
                            <input type="text"
                                   class="form-control"
                                   placeholder="Enter roll number"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Branch</label>
                            <input type="text"
                                   class="form-control"
                                   placeholder="Enter branch"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   class="form-control"
                                   placeholder="Enter email"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mobile Number</label>
                            <input type="tel"
                                   class="form-control"
                                   placeholder="Enter mobile number"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Event Selection</label>
                            <select class="form-select" required>
                                <option value="">Select Event</option>
                                <option>Technical Quiz</option>
                                <option>Hackathon</option>
                                <option>Poster Presentation</option>
                                <option>Coding Contest</option>
                                <option>Project Expo</option>
                                <option>Cultural Fest</option>
                            </select>
                        </div>

                        <button type="submit"
                                class="btn btn-success w-100">
                            Register
                        </button>

                    </form>

                </div>
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
