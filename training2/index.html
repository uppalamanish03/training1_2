
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navigation Bar</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .jtext{

            animation: jump 0.3s infinite;
        }
        @keyframes jump{
            0%{
                transform: translateY(0);
            }
            50%{
                transform: translateY(-20px);
            }
        }
        h2{
            text-align: center;
        }
    </style>
</head>

<body>
    <header id="mainHeader">
        <h1 style="color:red;" class="jtext">Responsive Navigation Bar</h1>
        <nav>
            <div class="nav-menu">
                <a class="jtext" href="#">Home</a>
                <a class="jtext" href="#">About</a>
                <a class="jtext" href="#">Services</a>
               <a class="jtext" href="#">Contact</a>
            </div>
        </nav>
    </header>
    <div class="jtext">
        <h2>jumpingg</h2>
    </div>
    
</body>
</html>
